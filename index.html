<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexa</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@200;300;400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}

:root{
  --bg:#04040c;
  --w:#fff;
  --w50:rgba(255,255,255,.5);
  --w20:rgba(255,255,255,.2);
  --w08:rgba(255,255,255,.08);
  --w04:rgba(255,255,255,.04);
  --c1:#00e5ff;
  --c2:#7c3aed;
  --c3:#f0abfc;
  --c1d:rgba(0,229,255,.18);
  --c2d:rgba(124,58,237,.18);
  --grad:linear-gradient(130deg,var(--c1),var(--c2));
  --bdr:rgba(0,229,255,.18);
  --bdr-h:rgba(0,229,255,.5);
}

body{
  background:var(--bg);
  color:var(--w);
  font-family:'Exo 2',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
  cursor:none;
}

/* ─── CURSOR ─── */
#dot{position:fixed;width:6px;height:6px;border-radius:50%;background:var(--c1);pointer-events:none;z-index:9999;transform:translate(-50%,-50%);box-shadow:0 0 10px var(--c1),0 0 20px var(--c1d);transition:width .2s,height .2s,background .2s}
#ring{position:fixed;width:26px;height:26px;border-radius:50%;border:1px solid rgba(0,229,255,.5);pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .3s,height .3s,border-color .3s}
body.hov #dot{width:12px;height:12px;background:var(--c2);box-shadow:0 0 16px var(--c2)}
body.hov #ring{width:38px;height:38px;border-color:rgba(124,58,237,.6)}

/* ─── BG ─── */
.bg-img{
  position:fixed;inset:-10%;
  background:url('https://files.useyapi.com/projects/jYaWDB-0iSo0DPGsRZWnO/uploads/c76e1648-38df-49e8-978f-5493c2dfcfbd-1001926161.jpg') center/cover no-repeat;
  will-change:transform;z-index:0;
  filter:saturate(0.25) brightness(0.22);
}
.bg-veil{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background:
    radial-gradient(ellipse 70% 50% at 50% -5%,rgba(0,229,255,0.06) 0%,transparent 60%),
    radial-gradient(ellipse 55% 45% at 100% 100%,rgba(124,58,237,0.06) 0%,transparent 60%),
    linear-gradient(to bottom,rgba(4,4,12,.2) 0%,rgba(4,4,12,.7) 45%,rgba(4,4,12,.98) 100%);
}
.mesh{position:fixed;inset:0;z-index:1;pointer-events:none;}

/* horizontal scanlines */
.scan{
  position:fixed;inset:0;z-index:2;pointer-events:none;opacity:0.025;
  background:repeating-linear-gradient(0deg,transparent 0px,transparent 2px,rgba(255,255,255,.6) 2px,rgba(255,255,255,.6) 3px);
}

/* top neon border */
.top-bar{
  position:fixed;top:0;left:0;right:0;z-index:3;
  height:1.5px;
  background:linear-gradient(to right,transparent,var(--c1) 25%,var(--c2) 75%,transparent);
  opacity:.7;
}
.top-bar::after{
  content:'';position:absolute;inset:0;height:50px;
  background:linear-gradient(to bottom,rgba(0,229,255,.05),transparent);
}

/* grain */
.grain{position:fixed;inset:0;z-index:2;pointer-events:none;opacity:.04;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:160px;
}

/* particles */
.ptcl{position:fixed;inset:0;z-index:2;pointer-events:none;overflow:hidden;}
.pp{position:absolute;border-radius:50%;animation:pp-rise linear infinite;}
@keyframes pp-rise{
  0%{opacity:0;transform:translateY(0)}8%{opacity:.9}90%{opacity:.1}100%{opacity:0;transform:translateY(-105vh) scale(.2)}
}

/* ─── LAYOUT ─── */
.wrap{position:relative;z-index:4;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:52px 20px 50px;}
.root{width:100%;max-width:450px;display:flex;flex-direction:column;align-items:center;}

/* ─── AVATAR BLOCK ─── */
.av-block{
  position:relative;margin-bottom:26px;
  opacity:0;transform:translateY(20px) scale(.93);
  transition:opacity .9s cubic-bezier(.22,1,.36,1),transform .9s cubic-bezier(.22,1,.36,1);
}
.av-block.on{opacity:1;transform:none;}

/* square avatar with clipped corners */
.av-frame{
  width:150px;height:150px;
  position:relative;
  clip-path:polygon(15px 0%,calc(100% - 15px) 0%,100% 15px,100% calc(100% - 15px),calc(100% - 15px) 100%,15px 100%,0% calc(100% - 15px),0% 15px);
}

/* glowing animated border via pseudo */
.av-frame::before{
  content:'';
  position:absolute;inset:-2px;
  clip-path:polygon(15px 0%,calc(100% - 15px) 0%,100% 15px,100% calc(100% - 15px),calc(100% - 15px) 100%,15px 100%,0% calc(100% - 15px),0% 15px);
  background:conic-gradient(from 0deg,var(--c1),var(--c2),#ff6ef7,var(--c1));
  z-index:-1;
  animation:spin-border 4s linear infinite;
}
@keyframes spin-border{to{filter:hue-rotate(360deg);}}

.av-img{
  width:100%;height:100%;
  object-fit:cover;display:block;
  clip-path:polygon(15px 0%,calc(100% - 15px) 0%,100% 15px,100% calc(100% - 15px),calc(100% - 15px) 100%,15px 100%,0% calc(100% - 15px),0% 15px);
  position:relative;z-index:1;
  transition:filter .5s ease,transform .5s cubic-bezier(.22,1,.36,1);
}
.av-block:hover .av-img{filter:brightness(1.1) saturate(1.1);transform:scale(1.04);}

/* corner tech lines */
.av-corner{position:absolute;width:18px;height:18px;border-color:var(--c1);border-style:solid;opacity:.8;}
.av-corner.tl{top:-4px;left:-4px;border-width:2px 0 0 2px;}
.av-corner.tr{top:-4px;right:-4px;border-width:2px 2px 0 0;}
.av-corner.bl{bottom:-4px;left:-4px;border-width:0 0 2px 2px;}
.av-corner.br{bottom:-4px;right:-4px;border-width:0 2px 2px 0;}

/* scanning line */
.av-scan{
  position:absolute;left:0;right:0;height:2px;
  background:linear-gradient(to right,transparent,rgba(0,229,255,.7),transparent);
  box-shadow:0 0 8px var(--c1);
  animation:scan-move 2.5s ease-in-out infinite;
  z-index:2;pointer-events:none;
}
@keyframes scan-move{0%{top:-5%}50%{top:100%}50.001%{top:-5%;opacity:0}50.002%{opacity:1}100%{top:100%}}

/* status pill */
.av-pill{
  position:absolute;bottom:-12px;left:50%;transform:translateX(-50%);
  display:flex;align-items:center;gap:5px;
  background:rgba(4,4,12,.9);
  border:1px solid rgba(0,229,255,.3);
  border-radius:20px;padding:3px 10px 3px 8px;
  backdrop-filter:blur(12px);white-space:nowrap;
  box-shadow:0 4px 16px rgba(0,0,0,.5),0 0 12px rgba(0,229,255,.08);
}
.pill-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;box-shadow:0 0 8px #4ade80;animation:blink 2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.pill-txt{font-family:'Share Tech Mono',monospace;font-size:.6rem;letter-spacing:2px;color:#4ade80;text-transform:uppercase;}

/* ─── NAME LOGO ─── */
.name-block{
  text-align:center;margin-top:20px;margin-bottom:28px;
  opacity:0;transform:translateY(18px);
  transition:opacity .85s .18s cubic-bezier(.22,1,.36,1),transform .85s .18s cubic-bezier(.22,1,.36,1);
}
.name-block.on{opacity:1;transform:none;}

/* use the custom font PNG image as the wordmark */
.name-logo{
  display:block;
  width:260px;max-width:100%;
  margin:0 auto 12px;
  filter:
    drop-shadow(0 0 12px rgba(0,229,255,.5))
    drop-shadow(0 0 30px rgba(0,229,255,.2))
    drop-shadow(0 2px 8px rgba(0,0,0,.8));
  animation:logo-pulse 4s ease-in-out infinite;
}
@keyframes logo-pulse{
  0%,100%{filter:drop-shadow(0 0 12px rgba(0,229,255,.5)) drop-shadow(0 0 30px rgba(0,229,255,.2)) drop-shadow(0 2px 8px rgba(0,0,0,.8));}
  50%{filter:drop-shadow(0 0 20px rgba(0,229,255,.8)) drop-shadow(0 0 50px rgba(124,58,237,.35)) drop-shadow(0 2px 8px rgba(0,0,0,.8));}
}

.name-tag{
  display:flex;align-items:center;gap:10px;justify-content:center;
}
.name-bar{flex:1;height:1px;background:linear-gradient(to right,transparent,var(--bdr),transparent);}
.name-txt{
  font-family:'Share Tech Mono',monospace;
  font-size:.6rem;letter-spacing:4px;text-transform:uppercase;color:var(--w20);
}

/* ─── LINKS ─── */
.links{width:100%;display:flex;flex-direction:column;gap:10px;margin-bottom:38px;}

.lk{
  position:relative;display:flex;align-items:center;gap:14px;
  padding:16px 20px;
  text-decoration:none;color:var(--w);
  background:var(--w04);
  border:1px solid var(--bdr);
  border-radius:0; /* sharp edges for cyber look */
  clip-path:polygon(12px 0%,100% 0%,100% calc(100% - 12px),calc(100% - 12px) 100%,0% 100%,0% 12px);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  overflow:hidden;
  opacity:0;transform:translateX(-18px);
  transition:opacity .7s cubic-bezier(.22,1,.36,1),transform .7s cubic-bezier(.22,1,.36,1),background .3s,border-color .3s,box-shadow .3s;
  box-shadow:0 4px 24px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.04);
}
.lk.on{opacity:1;transform:none;}

/* shimmer */
.lk::before{
  content:'';position:absolute;top:0;left:-90%;width:55%;height:100%;
  background:linear-gradient(105deg,transparent,rgba(0,229,255,.06),transparent);
  transition:left .65s ease;
}
.lk:hover::before{left:160%;}

/* left accent */
.lk::after{
  content:'';position:absolute;left:0;top:10%;
  width:2px;height:80%;border-radius:1px;
  background:var(--grad);
  opacity:0;transition:opacity .3s;
}
.lk:hover::after{opacity:1;}

.lk:hover{
  background:var(--w08);
  border-color:var(--bdr-h);
  transform:translateY(-3px) translateX(0);
  box-shadow:0 14px 40px rgba(0,0,0,.5),0 0 0 1px rgba(0,229,255,.1),0 0 30px rgba(0,229,255,.05);
}

/* icon */
.lk-ico{
  width:42px;height:42px;
  clip-path:polygon(8px 0%,100% 0%,100% calc(100% - 8px),calc(100% - 8px) 100%,0% 100%,0% 8px);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  transition:transform .4s cubic-bezier(.22,1,.36,1);
}
.lk:hover .lk-ico{transform:scale(1.08) rotate(-5deg);}
.ico-wa  {background:linear-gradient(140deg,#25d366,#0a6d3b);}
.ico-grp {background:linear-gradient(140deg,#38bdf8,#0369a1);}
.ico-rdm {background:linear-gradient(140deg,#fb923c,#b45309);}

/* text */
.lk-body{flex:1;min-width:0;}
.lk-ttl{display:block;font-size:.9rem;font-weight:500;letter-spacing:.5px;margin-bottom:2px;font-family:'Rajdhani',sans-serif;}
.lk-dsc{display:block;font-size:.68rem;font-weight:300;color:var(--w50);letter-spacing:.6px;font-family:'Exo 2',sans-serif;}

/* arrow */
.lk-arr{font-size:1rem;color:var(--w20);transition:transform .3s,color .3s;}
.lk:hover .lk-arr{transform:translateX(5px);color:var(--c1);}

/* badge */
.lk-badge{
  position:absolute;top:7px;right:10px;
  font-family:'Share Tech Mono',monospace;
  font-size:.5rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;
  color:var(--c1);background:var(--c1d);
  border:1px solid rgba(0,229,255,.35);
  border-radius:2px;padding:2px 7px;
}
.badge-amber{color:#fbbf24;background:rgba(251,191,36,.12);border-color:rgba(251,191,36,.4);}

/* ─── FOOTER ─── */
.footer{
  display:flex;flex-direction:column;align-items:center;gap:10px;
  opacity:0;transition:opacity 1s .9s ease;
}
.footer.on{opacity:1;}
.f-dots{display:flex;gap:7px;}
.f-d{width:3px;height:3px;border-radius:50%;}
.f-d:nth-child(1){background:var(--c1);box-shadow:0 0 5px var(--c1);}
.f-d:nth-child(2){background:var(--c2);box-shadow:0 0 5px var(--c2);}
.f-d:nth-child(3){background:var(--w20);}
.f-txt{font-family:'Share Tech Mono',monospace;font-size:.58rem;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.18);}

/* responsive */
@media(max-width:480px){
  .av-frame{width:128px;height:128px;}
  .name-logo{width:200px;}
  .lk{padding:14px 16px;gap:12px;}
  .lk-ico{width:38px;height:38px;}
  .wrap{padding:44px 16px 44px;}
}
</style>
</head>

<script>
/* cursor */
const dot=document.getElementById('dot'),ring=document.getElementById('ring');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{
  mx=e.clientX;my=e.clientY;
  dot.style.left=mx+'px';dot.style.top=my+'px';
  document.getElementById('mesh').style.background=
    `radial-gradient(circle at ${(mx/innerWidth*100).toFixed(1)}% ${(my/innerHeight*100).toFixed(1)}%,rgba(0,229,255,.055) 0%,transparent 48%)`;
});
(function tr(){rx+=(mx-rx)*.11;ry+=(my-ry)*.11;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(tr);})();
document.querySelectorAll('a').forEach(el=>{
  el.addEventListener('mouseenter',()=>document.body.classList.add('hov'));
  el.addEventListener('mouseleave',()=>document.body.classList.remove('hov'));
});

/* parallax */
const bg=document.getElementById('bg');
window.addEventListener('scroll',()=>{bg.style.transform=`translateY(${scrollY*.22}px)`;},{passive:true});

/* reveal */
[['e0',0],['e1',170],['e2',320],['e3',450],['e4',570],['e5',720]].forEach(([id,d])=>{
  const el=document.getElementById(id);
  if(el)setTimeout(()=>el.classList.add('on'),d+70);
});

/* particles */
const pc=document.getElementById('ptcl');
['rgba(0,229,255,.9)','rgba(124,58,237,.9)','rgba(240,171,252,.8)','rgba(255,255,255,.5)'].forEach((col,ci)=>{
  for(let i=0;i<6;i++){
    const p=document.createElement('div');p.className='pp';
    const s=Math.random()*2+.5,dur=Math.random()*18+12,del=Math.random()*22,x=Math.random()*100;
    p.style.cssText=`width:${s}px;height:${s}px;left:${x}%;bottom:0;background:${col};animation-duration:${dur}s;animation-delay:-${del}s;box-shadow:0 0 ${s*4}px ${col};`;
    pc.appendChild(p);
  }
});
</script>
